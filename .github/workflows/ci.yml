# CI using nix, as fast as possible
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID

name: Rapid Deploy 🚀
on:
  workflow_dispatch:
  push:

jobs:
  build-and-deploy:
    strategy:
      matrix:
        runner:
          - { os: ubuntu-latest, platform: linux, arch: x86_64 }
    runs-on: ${{ matrix.runner.os }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@main
      - uses: nixbuild/nix-quick-install-action@master

      - uses: actions/cache@main
        with:
          save-always: true
          path: /nix
          key: nix-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}-

      - run: nix build .

      - name: Upload build artifact 📦
        uses: actions/upload-artifact@main
        with:
          name: result-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}
          path: result

      - name: Push docker image 🚀
        if: matrix.runner.platform == 'linux'
        run: |
          nix build .#docker --out-link result-prod
          SHORT_SHA="${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}"
          CREDS="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
          nix run nixpkgs#skopeo -- copy --dest-creds "$CREDS" oci-archive:result-prod "docker://$GHCR_IMAGE:$SHORT_SHA"
          nix run nixpkgs#skopeo -- copy --dest-creds "$CREDS" oci-archive:result-prod "docker://$GHCR_IMAGE:latest"

      - name: Push docker-dev image 🚀
        if: matrix.runner.platform == 'linux'
        run: |
          nix build .#docker-dev --out-link result-dev
          SHORT_SHA="${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}-dev"
          CREDS="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
          nix run nixpkgs#skopeo -- copy --insecure-policy --dest-creds "$CREDS" docker-archive:result-dev "docker://$GHCR_IMAGE:$SHORT_SHA"
          nix run nixpkgs#skopeo -- copy --insecure-policy --dest-creds "$CREDS" docker-archive:result-dev "docker://$GHCR_IMAGE:latest"

      - name: Deploy to Cloudflare 🪂
        if: matrix.runner.arch == 'x86_64'
        run: |
          source .env
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              # Production: deploy to live traffic
              npx wrangler deploy --name "$PROJECT_NAME"
            else
              # Preview: upload version with branch alias (no production traffic)
              npx wrangler versions upload --name "$PROJECT_NAME" \
                --tag "${{ github.ref_name }}" \
                --message "Branch: ${{ github.ref_name }}"
            fi
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

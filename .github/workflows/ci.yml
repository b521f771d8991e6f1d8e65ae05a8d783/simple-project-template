# Rapid Release — non-reproducible fast path for development branches
#
# Skips Nix and builds directly on the runner for speed (~1 min vs ~10 min).
# Use this for rapid iteration on feature branches and dev — the tradeoff
# is that builds are NOT reproducible (they depend on runner state, cached
# layers, and non-pinned system tools). For reproducible release builds
# on beta/stable, use the Nix Flake workflow instead.
#
# Jobs:
#   rapid-deploy    — 📱 Expo web + ☁️ Cloudflare Workers deploy
#                     main → production deploy, other branches → preview version
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Rapid Deploy 🚀
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:

jobs:
  rapid-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@main

      # ── Environment setup 🔧 ──────────────────────────────────
      - name: Restore build caches 📦
        uses: actions/cache@main
        with:
          path: |
            node_modules
            /tmp/metro-cache
            /tmp/metro-file-map-*
          key: build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install dependencies 🔧
        run: npm ci

      # ── Build & Deploy 🏗️ ─────────────────────────────────────
      - name: Build & deploy 🏗️🚀
        run: |
          source .env
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              # Production: deploy to live traffic
              npx wrangler deploy --name "$PROJECT_NAME"
            else
              # Preview: upload version with branch alias (no production traffic)
              npx wrangler versions upload --name "$PROJECT_NAME" \
                --tag "${{ github.ref_name }}" \
                --message "Branch: ${{ github.ref_name }}"
            fi
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload build artifacts 📤
        uses: actions/upload-artifact@main
        with:
          name: result-cloudflare-worker-rapid-release
          path: dist/
          if-no-files-found: error

  build-docker-images:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@main
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: nix build .#docker --out-link result-prod
      - run: nix build .#docker-dev --out-link result-dev

      - name: Log in to GHCR 🔑
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Load and push docker image 🚀
        run: |
          docker load < result-prod
          SHORT_SHA="${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}"
          LOADED_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:$SHORT_SHA"
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:latest"
          docker push "$GHCR_IMAGE:$SHORT_SHA"
          docker push "$GHCR_IMAGE:latest"

      - name: Load and push docker-dev image 🚀
        run: |
          docker load < result-dev
          SHORT_SHA="${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}-dev"
          LOADED_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -v "^ghcr.io" | head -1)
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:$SHORT_SHA"
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:latest"
          docker push "$GHCR_IMAGE:$SHORT_SHA"
          docker push "$GHCR_IMAGE:latest"


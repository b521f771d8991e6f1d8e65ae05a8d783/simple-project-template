# CI using nix, as fast as possible
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID

name: Rapid Deploy 🚀
on:
  workflow_dispatch:
  push:
  delete:

jobs:
  build-and-deploy:
    if: github.event_name != 'delete'
    strategy:
      matrix:
        runner:
          - { os: ubuntu-24.04, platform: linux, arch: x86_64 }
    runs-on: ${{ matrix.runner.os }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@main
      - uses: nixbuild/nix-quick-install-action@master
      - uses: nix-community/cache-nix-action@main
        with:
          primary-key: nix-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}-

      - run: nix build . -L --show-trace

      - name: Upload build artifact 📦
        uses: actions/upload-artifact@main
        with:
          name: result-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}
          path: result

      - name: Log in to GHCR 🔑
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push docker image 🐋
        if: |
          matrix.runner.platform == 'linux' && (
            github.event_name == 'workflow_dispatch' ||
            github.ref == 'refs/heads/main' ||
            github.ref == 'refs/heads/master' ||
            github.ref == 'refs/heads/dev' ||
            github.ref == 'refs/heads/stable' ||
            github.ref == 'refs/heads/beta'
          )
        run: |
          time nix build .#docker --out-link result-prod
          time nix build .#docker-dev --out-link result-dev

          BRANCH_TAG=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          GHCR_PROD="ghcr.io/${{ github.repository }}"
          GHCR_DEV="ghcr.io/${{ github.repository }}-dev"

          docker load < result-prod
          PROD_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          docker tag "$PROD_IMAGE" "$GHCR_PROD:$BRANCH_TAG"
          docker push "$GHCR_PROD:$BRANCH_TAG"

          docker load < result-dev
          DEV_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -v "^ghcr.io" | head -1)
          docker tag "$DEV_IMAGE" "$GHCR_DEV:$BRANCH_TAG"
          docker push "$GHCR_DEV:$BRANCH_TAG" 

      - name: Deploy to Cloudflare 🪂
        if: matrix.runner.arch == 'x86_64'
        run: |
          source .env
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              # Production: deploy to live traffic
              npx wrangler deploy --name "$PROJECT_NAME"
            else
              # Preview: upload version with branch alias (no production traffic)
              npx wrangler versions upload --name "$PROJECT_NAME" \
                --tag "${{ github.ref_name }}" \
                --message "Branch: ${{ github.ref_name }}"
            fi
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  cleanup-images:
    if: ${{ !cancelled() }}
    needs: [build-and-deploy]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@main
      - name: Clean up stale Docker images 🧹
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/workflows/cleanup-images.sh
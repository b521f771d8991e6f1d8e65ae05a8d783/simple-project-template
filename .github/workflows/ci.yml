# CI using nix
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID

name: Rapid Deploy 🚀
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    strategy:
      matrix:
        runner:
          - { os: ubuntu-latest, platform: linux, arch: x86_64 }
    runs-on: ${{ matrix.runner.os }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@main
      - uses: nixbuild/nix-quick-install-action@master

      - run: nix build .

      - name: Upload build artifact 📦
        uses: actions/upload-artifact@main
        with:
          name: result-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}
          path: result

      - name: Log in to GHCR 🔑
        uses: docker/login-action@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push docker image 🚀
        if: matrix.runner.platform == 'linux'
        run: |
          nix build .#docker --out-link result-prod
          docker load < result-prod
          SHORT_SHA="${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}"
          LOADED_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:$SHORT_SHA"
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:latest"
          docker push "$GHCR_IMAGE:$SHORT_SHA"
          docker push "$GHCR_IMAGE:latest"

      - name: Load and push docker-dev image 🚀
        if: matrix.runner.platform == 'linux'
        run: |
          nix build .#docker-dev --out-link result-dev
          docker load < result-dev
          SHORT_SHA="${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}-dev"
          LOADED_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -v "^ghcr.io" | head -1)
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:$SHORT_SHA"
          docker tag "$LOADED_IMAGE" "$GHCR_IMAGE:latest"
          docker push "$GHCR_IMAGE:$SHORT_SHA"
          docker push "$GHCR_IMAGE:latest"

      - name: Deploy to Cloudflare 🪂
        if: matrix.runner.arch == 'x86_64'
        run: |
          source .env
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              # Production: deploy to live traffic
              npx wrangler deploy --name "$PROJECT_NAME"
            else
              # Preview: upload version with branch alias (no production traffic)
              npx wrangler versions upload --name "$PROJECT_NAME" \
                --tag "${{ github.ref_name }}" \
                --message "Branch: ${{ github.ref_name }}"
            fi
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

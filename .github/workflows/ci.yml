name: Nix Flake ❄️
on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    permissions:
      contents: read
      packages: write
      actions: write
      id-token: write
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - uses: nixbuild/nix-quick-install-action@v34

      - name: Build and test Nix Flake
        run: |
          nix flake check -L --show-trace
          mkdir ${{ runner.temp }}/result
          nix copy --no-check-sigs \
            .#default \
            --to ${{ runner.temp }}/result

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ runner.os }}-${{ runner.arch }}
          path: ${{ runner.temp }}/result
          if-no-files-found: error

      #- name: Push Docker image to GHCR
      #  if: runner.os == 'Linux' && runner.arch == 'X64'
      #  env:
      #    REGISTRY: ghcr.io
      #    IMAGE_NAME: ${{ github.repository }}
      #  run: |
      #    nix build .#docker
      #    echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      #    IMAGE_TAG="${GITHUB_SHA::8}"
      #    docker load < "$(readlink -f result)"
      #    docker tag "${IMAGE_NAME}:latest" "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      #    docker tag "${IMAGE_NAME}:latest" "${REGISTRY}/${IMAGE_NAME}:latest"
      #    docker push "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      #    docker push "${REGISTRY}/${IMAGE_NAME}:latest"

      - name: Deploy to Cloudflare 🚀
        if: github.event_name == 'push' && runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          source .env
          nix build -L .#default
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx wrangler deploy --name "$PROJECT_NAME"
          else
            npx wrangler versions upload --name "$PROJECT_NAME" \
              --tag "${{ github.ref_name }}" \
              --message "Branch: ${{ github.ref_name }}"
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

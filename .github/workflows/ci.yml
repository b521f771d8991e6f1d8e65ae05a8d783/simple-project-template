# CI using nix, as fast as possible
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID

name: Rapid Deploy 🚀
on:
  workflow_dispatch:
  push:

jobs:
  build-and-deploy:
    strategy:
      matrix:
        runner:
          - { os: ubuntu-latest, platform: linux, arch: x86_64 }
    runs-on: ${{ matrix.runner.os }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@main
      - uses: nixbuild/nix-quick-install-action@master
      - uses: nix-community/cache-nix-action@main
        with:
          primary-key: nix-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}-
          purge: true

      - run: nix build . -L --show-trace

      - name: Upload build artifact 📦
        uses: actions/upload-artifact@main
        with:
          name: result-${{ matrix.runner.platform }}-${{ matrix.runner.arch }}
          path: result

      - name: Push docker image 🐋
        if: |
          matrix.runner.platform == 'linux' && (
            github.event_name == 'workflow_dispatch' ||
            github.ref == 'refs/heads/main' ||
            github.ref == 'refs/heads/master' ||
            github.ref == 'refs/heads/dev' ||
            github.ref == 'refs/heads/stable' ||
            github.ref == 'refs/heads/beta'
          )
        run: |
          nix build .#docker --out-link result-prod
          nix build .#docker-dev --out-link result-dev

          SHORT_SHA="${GITHUB_SHA::7}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}"
          GHCR_IMAGE="ghcr.io/${{ github.repository }}-dev"
          CREDS="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          nix run nixpkgs#skopeo -- copy --insecure-policy --dest-creds "$CREDS" docker-archive:result-prod "docker://$GHCR_IMAGE:$SHORT_SHA"
          nix run nixpkgs#skopeo -- copy --insecure-policy --dest-creds "$CREDS" docker-archive:result-prod "docker://$GHCR_IMAGE:latest"
          nix run nixpkgs#skopeo -- copy --insecure-policy --dest-creds "$CREDS" docker-archive:result-dev "docker://$GHCR_IMAGE:$SHORT_SHA"
          nix run nixpkgs#skopeo -- copy --insecure-policy --dest-creds "$CREDS" docker-archive:result-dev "docker://$GHCR_IMAGE:latest"


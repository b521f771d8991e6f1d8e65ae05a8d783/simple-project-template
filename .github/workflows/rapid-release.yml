# Rapid Release — fast CF deploy for rapid tests. Tries to mimick the environment in `nix develop`, but faster and not reproducible
#
# Jobs:
#   deploy  — npm build + wrangler deploy to Cloudflare (fast path, ~30-45s)
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Rapid Release 🚀
on:
  workflow_dispatch:
  push:
  pull_request:
  delete:

jobs:
  deploy:
    if: github.event_name != 'delete'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      # ── Environment setup ──────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            /tmp/metro-cache
            /tmp/metro-file-map-*
          key: build-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'package-lock.json') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install system & CLI tools
        run: |
          curl -sL https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-musl.tgz | tar xz -C /usr/local/bin
          cargo binstall wasm-bindgen-cli@0.2.108 --no-confirm
          npm ci --ignore-scripts --prefer-offline

      # ── Build ──────────────────────────────────────────────────
      - name: Build
        run: npm run build:cloudflare-worker
        env:
          TMPDIR: /tmp

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: result-cloudflare-worker-rapid-release
          path: dist/
          if-no-files-found: error

      # ── Deploy ─────────────────────────────────────────────────
      - name: Prepare Cloudflare assets & compute worker name
        if: github.event_name == 'push'
        id: worker
        run: |
          mkdir -p result-cloudflare/assets
          cp -r dist/. result-cloudflare/assets/
          mv result-cloudflare/assets/worker.js result-cloudflare/worker.js 2>/dev/null || true
          rm -f result-cloudflare/assets/main.js
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=web-app" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
            echo "name=web-app-${BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push'
        run: npx wrangler deploy --name ${{ steps.worker.outputs.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SKIP_NIX_BUILD: "1"

  cleanup-preview:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-24.04
    steps:
      - name: Delete preview worker
        run: |
          BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/web-app-${BRANCH}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

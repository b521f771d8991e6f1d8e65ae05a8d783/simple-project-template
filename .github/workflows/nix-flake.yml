# Nix Flake CI/CD — reproducible build + Docker image + deploy + multi-platform smoke tests
#
# Jobs:
#   cleanup-images  — prunes old GHCR container images, keeping the 3 most recent
#   build           — runs `nix build` on ubuntu-24.04, ubuntu-24.04-arm, and macos-15:
#                       • ubuntu-24.04 builds .#cloudflare-worker, pushes Docker image, deploys to CF
#                       • other runners build the default package (smoke test)
#                       • all runners upload result/ as a per-OS artifact
#   cleanup-preview — deletes the preview worker from Cloudflare when a branch is deleted
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Nix Flake ❄️
on:
 workflow_dispatch:
 pull_request:
    branches: [main, master, stable, dev, beta]
 push:
    branches: [main, master, stable, dev, beta]

jobs:
 cleanup-images:
  permissions:
   packages: write
  runs-on: ubuntu-latest
  steps:
   - uses: actions/delete-package-versions@v5.0.0
     continue-on-error: true
     with:
      package-name: ${{ github.event.repository.name }}
      package-type: container
      min-versions-to-keep: 3
      delete-only-untagged-versions: false
      token: ${{ secrets.GITHUB_TOKEN }}

 build:
  permissions:
   contents: read
   packages: write
   actions: write
   id-token: write
  strategy:
   matrix:
    os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]
  runs-on: ${{ matrix.os }}
  steps:
   - uses: actions/checkout@v6.0.2

   - name: Check for nix
     id: check_nix
     run: |
      if command -v nix >/dev/null 2>&1; then
        echo "present=true" >> $GITHUB_OUTPUT
      else
        echo "present=false" >> $GITHUB_OUTPUT
      fi

   - uses: DeterminateSystems/flake-checker-action@v12
     with:
       fail-mode: false

   - uses: DeterminateSystems/nix-installer-action@v22
     if: steps.check_nix.outputs.present == 'false'
     with:
       flakehub: false

   - uses: DeterminateSystems/magic-nix-cache-action@v13
     with:
       use-flakehub: false

   - name: Build default + Cloudflare artifact
     if: matrix.os == 'ubuntu-24.04'
     run: |
      nix --extra-experimental-features "flakes nix-command" build .
      nix --extra-experimental-features "flakes nix-command" build .#cloudflare-worker --out-link result-cloudflare

   - name: Build Nix Flake
     if: matrix.os != 'ubuntu-24.04'
     run: |
      nix --extra-experimental-features "flakes nix-command" build .

   - name: Upload build result
     uses: actions/upload-artifact@v7.0.0
     with:
      name: result-${{ matrix.os }}
      path: result/
      if-no-files-found: error

   - name: Push Docker image to GHCR
     if: matrix.os == 'ubuntu-24.04'
     env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
     run: |
      nix --extra-experimental-features "flakes nix-command" build .#docker-image --out-link result-docker
      IMAGE_TAG="${GITHUB_SHA::8}"
      echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
      LOADED=$(docker load < "$(readlink -f result-docker)" | sed -n 's/^Loaded image: //p')
      docker tag "$LOADED" "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      docker tag "$LOADED" "${REGISTRY}/${IMAGE_NAME}:latest"
      docker push "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      docker push "${REGISTRY}/${IMAGE_NAME}:latest"

   - name: Compute worker name
     if: matrix.os == 'ubuntu-24.04' && github.event_name == 'push'
     id: worker
     run: |
      if [ "${{ github.ref }}" = "refs/heads/main" ]; then
        echo "name=web-app" >> $GITHUB_OUTPUT
      else
        BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
        echo "name=web-app-${BRANCH}" >> $GITHUB_OUTPUT
      fi

   - name: Deploy to Cloudflare Workers
     if: matrix.os == 'ubuntu-24.04' && github.event_name == 'push'
     uses: cloudflare/wrangler-action@v3.14.1
     with:
      apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      wranglerVersion: "4.79.0"
      command: deploy --name ${{ steps.worker.outputs.name }}
     env:
      SKIP_NIX_BUILD: "1"

 cleanup-preview:
  if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
  runs-on: ubuntu-latest
  steps:
   - name: Delete preview worker
     run: |
      BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
      curl -s -X DELETE \
        "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/web-app-${BRANCH}" \
        -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

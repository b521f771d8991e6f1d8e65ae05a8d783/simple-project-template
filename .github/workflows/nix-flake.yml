name: Nix Flake ❄️
on:
 workflow_dispatch:
 push:
 pull_request:

jobs:
 ci-dockerfile:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - uses: docker/setup-buildx-action@v3
   - name: Build CI Dockerfile
     uses: docker/build-push-action@v6
     with:
      file: .github/workflows/ci.dockerfile
      push: false
      cache-from: type=gha
      cache-to: type=gha,mode=max

 cleanup-images:
  permissions:
   packages: write
  runs-on: ubuntu-latest
  steps:
   - uses: actions/delete-package-versions@v5
     continue-on-error: true
     with:
      package-name: ${{ github.event.repository.name }}
      package-type: container
      min-versions-to-keep: 3
      delete-only-untagged-versions: false
      token: ${{ secrets.GITHUB_TOKEN }}

 build:
  needs: [ci-dockerfile, cleanup-images]
  permissions:
   contents: read
   packages: write
   actions: write
  strategy:
   matrix:
    os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]
  runs-on: ${{ matrix.os }}
  steps:
   # Pin to version tags — for max supply-chain security upgrade to pinned SHAs
   - uses: actions/checkout@v4

   - name: Check for nix
     id: check_nix
     run: |
      if command -v nix >/dev/null 2>&1; then
        echo "NIX_PRESENT=true" >> $GITHUB_ENV
        echo "present=true" >> $GITHUB_OUTPUT
      else
        echo "NIX_PRESENT=false" >> $GITHUB_ENV
        echo "present=false" >> $GITHUB_OUTPUT
      fi

   - uses: DeterminateSystems/flake-checker-action@v12
     with:
       fail-mode: false

   - uses: DeterminateSystems/nix-installer-action@v13
     if: steps.check_nix.outputs.present == 'false'
     with:
       flakehub: false

   - uses: DeterminateSystems/magic-nix-cache-action@v7
     with:
       use-flakehub: false

   - name: Build and test Nix Flake
     run: |
      nix --extra-experimental-features "flakes nix-command" flake check -L --show-trace
      mkdir ${{ runner.temp }}/result
      nix --extra-experimental-features "flakes nix-command" copy --no-check-sigs \
        .#web-app .#web-app-debug \
        .#native-lib .#rust-lib .#swift-lib .#typescript-app \
        .#wasm-pkg \
        --to ${{ runner.temp }}/result
      if [ "$(uname)" = "Linux" ]; then
        nix --extra-experimental-features "flakes nix-command" copy --no-check-sigs \
          .#docker-image .#docker-image-debug \
          --to ${{ runner.temp }}/result
      fi

   - name: Upload artifact
     uses: actions/upload-artifact@v4
     with:
      name: digests-${{ runner.os }}-${{ runner.arch }}
      path: ${{ runner.temp }}/result
      if-no-files-found: error

   - name: Push Docker image to GHCR
     if: runner.os == 'Linux'
     env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
     run: |
      nix --extra-experimental-features "flakes nix-command" build .#docker-image
      IMAGE_TAG="${GITHUB_SHA::8}"
      nix --extra-experimental-features "flakes nix-command" shell nixpkgs#skopeo -c \
        skopeo copy \
          "docker-archive:$(readlink -f result)" \
          "docker://${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" \
          --additional-tag "${REGISTRY}/${IMAGE_NAME}:latest" \
          --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
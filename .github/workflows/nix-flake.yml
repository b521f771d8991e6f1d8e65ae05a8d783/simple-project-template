# Nix Flake CI/CD
#
# Jobs:
#   ci-dockerfile   — builds the dev container Dockerfile to verify it is valid (no push)
#   cleanup-images  — prunes old GHCR container images, keeping the 3 most recent
#   build           — runs `nix build` on ubuntu-24.04, ubuntu-24.04-arm and macos-15:
#                       • builds the default package + .#cloudflare
#                       • builds and pushes the Docker image to GHCR (Linux only)
#                       • uploads result/ as a per-OS artifact
#                       • uploads result/ as the shared "cloudflare" artifact (ubuntu-24.04 only)
#   deploy          — downloads the "cloudflare" artifact and deploys via wrangler:
#                       • main  → production worker  (web-app)
#                       • other → preview worker     (web-app-<branch>, workers.dev URL per branch)
#   cleanup-preview — deletes the preview worker from Cloudflare when a branch is deleted
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Nix Flake ❄️
on:
 workflow_dispatch:
 push:
 pull_request:
 delete:

jobs:
 ci-dockerfile:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v6.0.2
   - uses: docker/setup-buildx-action@v4.0.0
   - name: Build CI Dockerfile
     uses: docker/build-push-action@v7.0.0
     with:
      file: .github/workflows/ci.dockerfile
      push: false
      cache-from: type=gha
      cache-to: type=gha,mode=max

 cleanup-images:
  permissions:
   packages: write
  runs-on: ubuntu-latest
  steps:
   - uses: actions/delete-package-versions@v5.0.0
     continue-on-error: true
     with:
      package-name: ${{ github.event.repository.name }}
      package-type: container
      min-versions-to-keep: 3
      delete-only-untagged-versions: false
      token: ${{ secrets.GITHUB_TOKEN }}

 build:
  needs: [ci-dockerfile, cleanup-images]
  permissions:
   contents: read
   packages: write
   actions: write
  strategy:
   matrix:
    os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]
  runs-on: ${{ matrix.os }}
  steps:
   # Pin to version tags — for max supply-chain security upgrade to pinned SHAs
   - uses: actions/checkout@v6.0.2

   - name: Check for nix
     id: check_nix
     run: |
      if command -v nix >/dev/null 2>&1; then
        echo "NIX_PRESENT=true" >> $GITHUB_ENV
        echo "present=true" >> $GITHUB_OUTPUT
      else
        echo "NIX_PRESENT=false" >> $GITHUB_ENV
        echo "present=false" >> $GITHUB_OUTPUT
      fi

   - uses: DeterminateSystems/flake-checker-action@v12 # latest
     with:
       fail-mode: false

   - uses: DeterminateSystems/nix-installer-action@v22
     if: steps.check_nix.outputs.present == 'false'
     with:
       flakehub: false

   - uses: DeterminateSystems/magic-nix-cache-action@v13
     with:
       use-flakehub: false

   - name: Build and test Nix Flake
     run: |
      nix --extra-experimental-features "flakes nix-command" build . .#cloudflare

   - name: Upload Cloudflare artifact
     if: matrix.os == 'ubuntu-24.04'
     uses: actions/upload-artifact@v7.0.0
     with:
      name: cloudflare
      path: result/
      if-no-files-found: error

   - name: Upload build result
     uses: actions/upload-artifact@v7.0.0
     with:
      name: result-${{ matrix.os }}
      path: result/
      if-no-files-found: error

   - name: Push Docker image to GHCR
     if: runner.os == 'Linux'
     env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
     run: |
      nix --extra-experimental-features "flakes nix-command" build .#docker-image
      IMAGE_TAG="${GITHUB_SHA::8}"
      nix --extra-experimental-features "flakes nix-command" shell nixpkgs#skopeo -c \
        skopeo copy \
          "docker-archive:$(readlink -f result)" \
          "docker://${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" \
          --additional-tag "${REGISTRY}/${IMAGE_NAME}:latest" \
          --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

 deploy-to-cloudflare:
  needs: [build]
  if: github.event_name == 'push'
  runs-on: ubuntu-latest
  timeout-minutes: 60
  steps:
   - uses: actions/checkout@v6.0.2

   - uses: actions/download-artifact@v8.0.1
     with:
      name: cloudflare
      path: result/

   - name: Compute worker name
     id: worker
     run: |
      if [ "${{ github.ref }}" = "refs/heads/main" ]; then
        echo "name=web-app" >> $GITHUB_OUTPUT
      else
        BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
        echo "name=web-app-${BRANCH}" >> $GITHUB_OUTPUT
      fi

   - name: Deploy to Cloudflare Workers
     uses: cloudflare/wrangler-action@v3.14.1
     with:
      apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      wranglerVersion: "4.79.0"
      command: deploy --name ${{ steps.worker.outputs.name }}
     env:
      SKIP_NIX_BUILD: "1"

 cleanup-preview:
  if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
  runs-on: ubuntu-latest
  steps:
   - name: Delete preview worker
     run: |
      BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
      curl -s -X DELETE \
        "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/web-app-${BRANCH}" \
        -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"
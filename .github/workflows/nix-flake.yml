# Nix Flake CI/CD
#
# Jobs:
#   ci-dockerfile   — builds the dev container Dockerfile to verify it is valid (no push)
#   cleanup-images  — prunes old GHCR container images, keeping the 3 most recent
#   build-and-deploy — runs on ubuntu-24.04:
#                       • builds .#cloudflare
#                       • builds and pushes the Docker image to GHCR
#                       • deploys to Cloudflare Workers (push only)
#   build           — runs on ubuntu-24.04-arm and macos-15:
#                       • builds the default package (smoke test)
#   cleanup-preview — deletes the preview worker from Cloudflare when a branch is deleted
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Nix Flake ❄️
on:
 workflow_dispatch:
 push:
 pull_request:
 delete:

jobs:
 ci-dockerfile:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v6.0.2
   - uses: docker/setup-buildx-action@v4.0.0
   - name: Build CI Dockerfile
     uses: docker/build-push-action@v7.0.0
     with:
      file: .github/workflows/ci.dockerfile
      push: false
      cache-from: type=gha
      cache-to: type=gha,mode=max

 cleanup-images:
  permissions:
   packages: write
  runs-on: ubuntu-latest
  steps:
   - uses: actions/delete-package-versions@v5.0.0
     continue-on-error: true
     with:
      package-name: ${{ github.event.repository.name }}
      package-type: container
      min-versions-to-keep: 3
      delete-only-untagged-versions: false
      token: ${{ secrets.GITHUB_TOKEN }}

 # Primary job: build cloudflare + docker, then deploy
 build-and-deploy:
  needs: [ci-dockerfile, cleanup-images]
  permissions:
   contents: read
   packages: write
   actions: write
   id-token: write
  runs-on: ubuntu-24.04
  steps:
   - uses: actions/checkout@v6.0.2

   - name: Check for nix
     id: check_nix
     run: |
      if command -v nix >/dev/null 2>&1; then
        echo "present=true" >> $GITHUB_OUTPUT
      else
        echo "present=false" >> $GITHUB_OUTPUT
      fi

   - uses: DeterminateSystems/flake-checker-action@v12
     with:
       fail-mode: false

   - uses: DeterminateSystems/nix-installer-action@v22
     if: steps.check_nix.outputs.present == 'false'
     with:
       flakehub: false

   - uses: DeterminateSystems/magic-nix-cache-action@v13
     with:
       use-flakehub: false

   - name: Build Cloudflare artifact
     run: |
      nix --extra-experimental-features "flakes nix-command" build .#cloudflare

   - name: Push Docker image to GHCR
     env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
     run: |
      nix --extra-experimental-features "flakes nix-command" build .#docker-image
      IMAGE_TAG="${GITHUB_SHA::8}"
      echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
      docker load < "$(readlink -f result)"
      docker tag web-app:latest "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      docker tag web-app:latest "${REGISTRY}/${IMAGE_NAME}:latest"
      docker push "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      docker push "${REGISTRY}/${IMAGE_NAME}:latest"

   - name: Compute worker name
     if: github.event_name == 'push'
     id: worker
     run: |
      if [ "${{ github.ref }}" = "refs/heads/main" ]; then
        echo "name=web-app" >> $GITHUB_OUTPUT
      else
        BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
        echo "name=web-app-${BRANCH}" >> $GITHUB_OUTPUT
      fi

   - name: Deploy to Cloudflare Workers
     if: github.event_name == 'push'
     uses: cloudflare/wrangler-action@v3.14.1
     with:
      apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      wranglerVersion: "4.79.0"
      command: deploy --name ${{ steps.worker.outputs.name }}
     env:
      SKIP_NIX_BUILD: "1"

 # Smoke-test builds on other platforms (no cloudflare, no deploy)
 build:
  needs: [ci-dockerfile, cleanup-images]
  permissions:
   contents: read
   actions: write
   id-token: write
  strategy:
   matrix:
    os: [ubuntu-24.04-arm, macos-15]
  runs-on: ${{ matrix.os }}
  steps:
   - uses: actions/checkout@v6.0.2

   - name: Check for nix
     id: check_nix
     run: |
      if command -v nix >/dev/null 2>&1; then
        echo "present=true" >> $GITHUB_OUTPUT
      else
        echo "present=false" >> $GITHUB_OUTPUT
      fi

   - uses: DeterminateSystems/flake-checker-action@v12
     with:
       fail-mode: false

   - uses: DeterminateSystems/nix-installer-action@v22
     if: steps.check_nix.outputs.present == 'false'
     with:
       flakehub: false

   - uses: DeterminateSystems/magic-nix-cache-action@v13
     with:
       use-flakehub: false

   - name: Build Nix Flake
     run: |
      nix --extra-experimental-features "flakes nix-command" build .

 cleanup-preview:
  if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
  runs-on: ubuntu-latest
  steps:
   - name: Delete preview worker
     run: |
      BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
      curl -s -X DELETE \
        "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/web-app-${BRANCH}" \
        -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

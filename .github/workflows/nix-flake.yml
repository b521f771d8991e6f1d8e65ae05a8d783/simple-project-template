# Nix Flake CI — full reproducible build + Docker image + multi-platform smoke tests
#
# Triggered on manual dispatch and pushes to main. For fast CI on every push, see ci.yml.
#
# Jobs:
#   cleanup-images  — prunes old GHCR container images, keeping the 3 most recent
#   build           — runs `nix build` on ubuntu-24.04, ubuntu-24.04-arm, and macos-15:
#                       • ubuntu-24.04 builds .#cloudflare, pushes Docker image
#                       • other runners build the default package (smoke test)
#                       • all runners upload result/ as a per-OS artifact
#
name: Nix Flake ❄️
on:
 workflow_dispatch:
 push:
  branches: [main, master, stable, beta]

jobs:
 cleanup-images:
  permissions:
   packages: write
  runs-on: ubuntu-latest
  steps:
   - uses: actions/delete-package-versions@v5.0.0
     continue-on-error: true
     with:
      package-name: ${{ github.event.repository.name }}
      package-type: container
      min-versions-to-keep: 3
      delete-only-untagged-versions: false
      token: ${{ secrets.GITHUB_TOKEN }}

 build:
  permissions:
   contents: read
   packages: write
   actions: write
   id-token: write
  strategy:
   matrix:
    os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]
  runs-on: ${{ matrix.os }}
  steps:
   - uses: actions/checkout@v6.0.2

   - name: Check for nix
     id: check_nix
     run: |
      if command -v nix >/dev/null 2>&1; then
        echo "present=true" >> $GITHUB_OUTPUT
      else
        echo "present=false" >> $GITHUB_OUTPUT
      fi

   - uses: DeterminateSystems/flake-checker-action@v12
     with:
       fail-mode: false

   - uses: DeterminateSystems/nix-installer-action@v22
     if: steps.check_nix.outputs.present == 'false'
     with:
       flakehub: false

   - uses: DeterminateSystems/magic-nix-cache-action@v13
     with:
       use-flakehub: false

   - name: Build Cloudflare artifact
     if: matrix.os == 'ubuntu-24.04'
     run: |
      nix --extra-experimental-features "flakes nix-command" build . .#cloudflare

   - name: Build Nix Flake
     if: matrix.os != 'ubuntu-24.04'
     run: |
      nix --extra-experimental-features "flakes nix-command" build .

   - name: Upload build result
     uses: actions/upload-artifact@v7.0.0
     with:
      name: result-${{ matrix.os }}
      path: result/
      if-no-files-found: error

   - name: Push Docker image to GHCR
     if: matrix.os == 'ubuntu-24.04'
     env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
     run: |
      nix --extra-experimental-features "flakes nix-command" build .#docker-image
      IMAGE_TAG="${GITHUB_SHA::8}"
      echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
      LOADED=$(docker load < "$(readlink -f result)" | sed -n 's/^Loaded image: //p')
      docker tag "$LOADED" "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      docker tag "$LOADED" "${REGISTRY}/${IMAGE_NAME}:latest"
      docker push "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      docker push "${REGISTRY}/${IMAGE_NAME}:latest"


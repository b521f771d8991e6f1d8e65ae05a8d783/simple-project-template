# Rapid Release — non-reproducible fast path for development branches
#
# Skips Nix and builds directly on the runner for speed (~1 min vs ~10 min).
# Use this for rapid iteration on feature branches and dev — the tradeoff
# is that builds are NOT reproducible (they depend on runner state, cached
# layers, and non-pinned system tools). For reproducible release builds
# on beta/stable, use the Nix Flake workflow instead.
#
# Jobs:
#   rapid-deploy    — 📱 Expo web + ☁️ Cloudflare Workers deploy
#                     main → production deploy, other branches → preview version
#   docker-build    — 🐳 Build and push Docker image to GHCR
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Build & Deploy 🚀
on:
  workflow_dispatch:
  push:
    branches-ignore: [main, dev, beta]
  pull_request:
    branches-ignore: [main, dev, beta]

jobs:
  rapid-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@main

      # ── Environment setup 🔧 ──────────────────────────────────
      - name: Restore build caches 📦
        uses: actions/cache@main
        with:
          path: |
            node_modules
            /tmp/metro-cache
            /tmp/metro-file-map-*
          key: build-${{ runner.os }}-${{ hashFiles('bun.lock', 'package-lock.json') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install tools & dependencies 🔧
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      # ── Build & Deploy 🏗️ ─────────────────────────────────────
      - name: Build & deploy 🏗️🚀
        run: |
          source .env
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              # Production: deploy to live traffic
              bunx wrangler deploy --name "$PROJECT_NAME"
            else
              # Preview: upload version with branch alias (no production traffic)
              bunx wrangler versions upload --name "$PROJECT_NAME" \
                --tag "${{ github.ref_name }}" \
                --message "Branch: ${{ github.ref_name }}"
            fi
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SKIP_NIX_BUILD: "1"

      - name: Upload build artifacts 📤
        uses: actions/upload-artifact@main
        with:
          name: result-cloudflare-worker-rapid-release
          path: dist/
          if-no-files-found: error

  docker-build:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@main

      - name: Log in to GHCR 🔑
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx 🏗️
        uses: docker/setup-buildx-action@v4

      - name: Build & push 🐳
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

  docker-manifest:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR 🔑
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest 🏗️
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker manifest create $IMAGE:${{ github.ref_name }} \
            $IMAGE:${{ github.sha }}-amd64 \
            $IMAGE:${{ github.sha }}-arm64
          docker manifest push $IMAGE:${{ github.ref_name }}
          docker manifest create $IMAGE:${{ github.sha }} \
            $IMAGE:${{ github.sha }}-amd64 \
            $IMAGE:${{ github.sha }}-arm64
          docker manifest push $IMAGE:${{ github.sha }}


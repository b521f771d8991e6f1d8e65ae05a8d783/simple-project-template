# Rapid Release — non-reproducible fast path for development branches
#
# Skips Nix and builds directly on the runner for speed (~1 min vs ~10 min).
# Use this for rapid iteration on feature branches and dev — the tradeoff
# is that builds are NOT reproducible (they depend on runner state, cached
# layers, and non-pinned system tools). For reproducible release builds
# on beta/stable, use the Nix Flake workflow instead.
#
# Jobs:
#   rapid-deploy    — 🦀 Rust WASM + 📱 Expo web + ☁️ Cloudflare Workers deploy
#   cleanup-preview — 🧹 deletes preview workers when a branch is deleted
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Rapid Deploy 🚀
on:
  workflow_dispatch:
  push:
    branches-ignore: [beta, stable]
  pull_request:
    branches-ignore: [beta, stable]
  delete:

jobs:
  rapid-deploy:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@main

      # ── Environment setup 🔧 ──────────────────────────────────
      - name: Restore build caches 📦
        uses: actions/cache@main
        with:
          path: |
            ~/.cargo
            target
            node_modules
            /tmp/metro-cache
            /tmp/metro-file-map-*
          key: build-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'package-lock.json') }}
          restore-keys: build-${{ runner.os }}-

      - name: Setup Bun 🐇
        uses: oven-sh/setup-bun@main

      - name: Install tools & dependencies 🦀🔧
        # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md most stuff is already installed :)
        run: |
          rustup target add wasm32-unknown-unknown
          if ! command -v wasm-bindgen >/dev/null 2>&1; then
            curl -sL https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-musl.tgz | tar xz -C /usr/local/bin
            cargo binstall wasm-bindgen-cli@0.2.108 --no-confirm
          fi
          bun install --frozen-lockfile --ignore-scripts

      # ── Build & Deploy 🏗️ ─────────────────────────────────────
      - name: Build & deploy 🏗️🚀
        run: |
          bun run build:cloudflare-worker
          if [ "${{ github.event_name }}" = "push" ]; then
            mkdir -p result-cloudflare/assets
            cp -r dist/. result-cloudflare/assets/
            mv result-cloudflare/assets/worker.js result-cloudflare/worker.js
            rm -f result-cloudflare/assets/main.js
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              WORKER_NAME="web-app"
            else
              WORKER_NAME="web-app-$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)"
            fi
            bunx wrangler deploy --name "$WORKER_NAME" --no-bundle --main result-cloudflare/worker.js
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload build artifacts 📤
        uses: actions/upload-artifact@main
        with:
          name: result-cloudflare-worker-rapid-release
          path: dist/
          if-no-files-found: error

  cleanup-preview:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview worker 🧹
        run: |
          BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/web-app-${BRANCH}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"

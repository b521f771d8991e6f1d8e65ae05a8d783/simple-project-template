# Rapid Release — non-reproducible fast path for development branches
#
# Skips Nix and builds directly on the runner for speed (~1 min vs ~10 min).
# Use this for rapid iteration on feature branches and dev — the tradeoff
# is that builds are NOT reproducible (they depend on runner state, cached
# layers, and non-pinned system tools). For reproducible release builds
# on beta/stable, use the Nix Flake workflow instead.
#
# Jobs:
#   rapid-deploy    — 📱 Expo web + ☁️ Cloudflare Workers deploy
#   cleanup-preview — 🧹 deletes preview workers when a branch is deleted
#
# Secrets required:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
name: Rapid Deploy 🚀
on:
  workflow_dispatch:
  push:
    branches-ignore: [beta, stable]
  pull_request:
    branches-ignore: [beta, stable]
  delete:

jobs:
  rapid-deploy:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@main

      # ── Environment setup 🔧 ──────────────────────────────────
      - name: Restore build caches 📦
        uses: actions/cache@main
        with:
          path: |
            node_modules
            /tmp/metro-cache
            /tmp/metro-file-map-*
          key: build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install tools & dependencies 🔧
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile --ignore-scripts
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      # ── Build & Deploy 🏗️ ─────────────────────────────────────
      - name: Build & deploy 🏗️🚀
        run: |
          source .env
          bun run build:cloudflare-worker:dev
          if [ "${{ github.event_name }}" = "push" ]; then
            mkdir -p result-cloudflare/assets
            cp -r dist/. result-cloudflare/assets/
            mv result-cloudflare/assets/worker.js result-cloudflare/worker.js
            rm -f result-cloudflare/assets/main.js
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              WORKER_NAME="${PROJECT_NAME}"
            else
              WORKER_NAME="${PROJECT_NAME}-$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)"
            fi
            bunx wrangler deploy result-cloudflare/worker.js --name "$WORKER_NAME" --no-bundle
          fi
        env:
          TMPDIR: /tmp
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SKIP_NIX_BUILD: "1"

      - name: Upload build artifacts 📤
        uses: actions/upload-artifact@main
        with:
          name: result-cloudflare-worker-rapid-release
          path: dist/
          if-no-files-found: error

  cleanup-preview:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Delete preview worker 🧹
        run: |
          source .env
          BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-53)
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/${PROJECT_NAME}-${BRANCH}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"
